name: Build CV

on:
  push:
    branches: [main]
    paths:
      - "cv.tex"
      - "publications.tex"
      - "scripts/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "cv.tex"
      - "publications.tex"
      - "scripts/**"
  workflow_dispatch:
  schedule:
    # Weekly refresh so newly-published work on ORCID flows into the CV.
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pull the latest publication list from ORCID + Crossref. Uses only the
      # Python standard library, so no pip install is needed.
      - name: Refresh publications from ORCID
        run: python3 scripts/fetch_publications.py

      # If the list changed, commit it back to main so the source stays in sync.
      # [skip ci] stops this commit from triggering another build.
      - name: Commit refreshed publications
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          if ! git diff --quiet -- publications.tex; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add publications.tex
            git commit -m "chore: refresh publications from ORCID [skip ci]"
            git push
          else
            echo "publications.tex unchanged"
          fi

      - name: Compile LaTeX -> PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: false

      - name: Upload PDF as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: cv.pdf

      # Stage only the files we want served, so the deploy never touches .git.
      - name: Stage site files
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          mkdir -p public
          cp cv.pdf public/
          cp index.html public/

      # Publish the built PDF to the gh-pages branch so it has a stable URL:
      #   https://chriswyatt1.github.io/cv/cv.pdf
      # Only runs on pushes to main (not on PRs).
      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
